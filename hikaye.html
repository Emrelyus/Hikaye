<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikaye Okuyucu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Temel Layout */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #050505;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* Sol Sidebar */
        #sidebar {
            width: 280px;
            background: #0f0f0f;
            border-right: 1px solid #222;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100vh;
            box-sizing: border-box;
        }

        #sidebar h3 {
            color: #fff;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        #search-box {
            background: #151515;
            border: 1px solid #222;
            padding: 8px 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 0.85rem;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        #story-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 10px;
        }

        /* Liste için ince scrollbar */
        #story-list::-webkit-scrollbar {
            width: 4px;
        }

        #story-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        #search-box:focus {
            border-color: #444;
        }

        #sidebar button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 8px 14px;
            cursor: pointer;
            border: 1px solid #222;
            background: #151515;
            color: #aaa;
            text-align: left;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .edit-icon {
            font-size: 0.8rem;
            opacity: 0.3;
            padding-left: 10px;
            transition: opacity 0.3s;
        }

        #sidebar button:hover .edit-icon {
            opacity: 1;
        }

        #sidebar button:hover {
            background: #202020;
            color: #fff;
            border-color: #444;
            transform: translateX(5px);
        }

        #sidebar button.selected-story {
            background: #c8e6c9;
            /* Çok açık yeşil */
            color: #000;
            /* Açık arka planda okunabilmesi için koyu metin */
            border-color: #a5d6a7;
            transform: translateX(5px);
            font-weight: 600;
        }

        #sidebar button.dragging {
            opacity: 0.5;
            border: 1px dashed #555;
            transform: scale(0.98);
        }

        .control-group {
            margin-top: 0;
            padding-top: 15px;
            border-top: 1px solid #222;
            flex-shrink: 0;
        }

        .control-group h3 {
            margin-bottom: 5px !important;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #444;
        }

        #fontSizeValue {
            display: block;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        /* Sağ İçerik Alanı */
        #content {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
            background: radial-gradient(circle at top left, #111 0%, #050505 100%);
            max-width: 800px;
            margin: 0 auto;
        }

        #metin {
            line-height: 1.8;
            font-size: 12px;
            color: #999;
            max-width: 600px;
            white-space: pre-wrap;
            outline: none;
            padding: 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        #metin[contenteditable="true"] {
            background: #0a0a0a;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .edit-controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .secondary-btn {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .secondary-btn:hover {
            border-color: #555;
            color: #ccc;
        }

        .secondary-btn.active {
            background: #222;
            color: #fff;
            border-color: #444;
        }

        #playBtn.active {
            background: #1b5e20 !important;
            color: #fff !important;
            border-color: #2e7d32 !important;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.2);
        }

        /* Scrollbar Özelleştirme - 4 Kat Kalınlık */
        #content::-webkit-scrollbar {
            width: 32px;
        }

        #content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-left: 1px solid #222;
        }

        #content::-webkit-scrollbar-thumb {
            background: #333;
            border: 8px solid #0f0f0f;
            /* İçeriden boşluk bırakarak şık bir görünüm sağlar */
            border-radius: 20px;
        }

        #content::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* Firefox Desteği */
        #content {
            scrollbar-width: thick;
            scrollbar-color: #333 #0f0f0f;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h3>Hikaye Okuyucu</h3>
        <input type="text" id="search-box" placeholder="Hikaye veya kelime ara..." oninput="ara(this.value)">
        <div id="story-list">
            <!-- JavaScript ile doldurulacak -->
        </div>

        <div class="control-group">
            <h3>Yazı Boyutu</h3>
            <input type="range" id="fontSizeRange" min="6" max="32" value="12" oninput="boyutAyarla(this.value)">
            <span id="fontSizeValue">12px</span>
        </div>

        <div class="control-group">
            <h3>Otomatik Kaydırma</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button id="playBtn" onclick="togglePlay()" style="margin: 0; flex: 1; text-align: center;">▶
                    Oynat</button>
            </div>
            <label style="font-size: 0.8rem; color: #666;">Hız</label>
            <input type="range" id="scrollSpeed" min="1" max="100" value="20" oninput="hizGuncelle(this.value)">
        </div>

        <div class="control-group" style="display: flex; gap: 8px;">
            <button onclick="hikayeEkle()"
                style="margin: 0; flex: 1; justify-content: center; background: #1b5e20; color: #fff; border-color: #2e7d32; padding: 5px; font-size: 0.75rem; border-radius: 4px;">+
                Ekle</button>
            <button onclick="hikayeSil()"
                style="margin: 0; flex: 1; justify-content: center; background: #b71c1c; color: #fff; border-color: #c62828; padding: 5px; font-size: 0.75rem; border-radius: 4px;">-
                Sil</button>
        </div>

        <div class="control-group">
            <h3>JSON Dosyası</h3>
            <div style="display: flex; gap: 6px; margin-bottom: 6px;">
                <button id="jsonBindBtn" onclick="jsonDosyasiBagla()"
                    style="margin: 0; flex: 1; justify-content: center; background: #0d2a4a; color: #7fb3e8; border-color: #1a4a7a; padding: 5px; font-size: 0.7rem; border-radius: 4px;"
                    title="JSON dosyası bağla / oluştur">
                    📂 Bağla
                </button>
                <button onclick="jsonYukle()"
                    style="margin: 0; flex: 1; justify-content: center; background: #1a2a1a; color: #7ecf7e; border-color: #2e5e2e; padding: 5px; font-size: 0.7rem; border-radius: 4px;"
                    title="JSON dosyasından yükle">
                    ⬆ Yükle
                </button>
                <button onclick="manuelKaydet()"
                    style="margin: 0; flex: 1; justify-content: center; background: #2a1a00; color: #f0a040; border-color: #6b4800; padding: 5px; font-size: 0.7rem; border-radius: 4px;"
                    title="JSON dosyasına hemen kaydet">
                    💾 Kaydet
                </button>
            </div>
            <span id="jsonFileStatus" style="display:block; font-size:0.72rem; color:#555; text-align:center;">Dosya
                bağlı değil</span>
        </div>
    </div>

    <div id="content">
        <p id="metin">Lütfen soldaki menüden bir hikaye seçin.</p>
        <div class="edit-controls">
            <button id="editContentBtn" class="secondary-btn" onclick="toggleEditContent()">✎ Metni Düzenle</button>
        </div>
    </div>

    <script>
        let hikayeler = {};
        let storyOrder = [];
        let activeStoryId = null;
        let isEditingContent = false;

        // ─── IndexedDB: file handle'ı oturumlar arası sakla ───────────────────
        const IDB_NAME = 'hikayeAppDB';
        const IDB_STORE = 'handles';
        const IDB_KEY = 'jsonHandle';

        function openIDB() {
            return new Promise((res, rej) => {
                const req = indexedDB.open(IDB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
                req.onsuccess = e => res(e.target.result);
                req.onerror = e => rej(e.target.error);
            });
        }
        async function idbPut(value) {
            const db = await openIDB();
            return new Promise((res, rej) => {
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).put(value, IDB_KEY);
                tx.oncomplete = res;
                tx.onerror = e => rej(e.target.error);
            });
        }
        async function idbGet() {
            const db = await openIDB();
            return new Promise((res, rej) => {
                const req = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(IDB_KEY);
                req.onsuccess = e => res(e.target.result);
                req.onerror = e => rej(e.target.error);
            });
        }
        async function idbClear() {
            const db = await openIDB();
            return new Promise((res, rej) => {
                const tx = db.transaction(IDB_STORE, 'readwrite');
                tx.objectStore(IDB_STORE).delete(IDB_KEY);
                tx.oncomplete = res;
                tx.onerror = e => rej(e.target.error);
            });
        }

        // ─── JSON DOSYA TUTAMACI ───────────────────────────────────────────────
        let jsonFileHandle = null;

        function setHandleUI(handle) {
            document.getElementById('jsonFileStatus').textContent = '🔗 ' + handle.name + ' — bağlı';
            const btn = document.getElementById('jsonBindBtn');
            btn.style.borderColor = '#2e7d32';
            btn.style.color = '#7ecf7e';
        }

        // JSON dosyasına kaydet
        async function saveToJsonFile() {
            if (!jsonFileHandle) return;
            try {
                // Yazma izni yoksa iste
                if ((await jsonFileHandle.queryPermission({ mode: 'readwrite' })) !== 'granted') {
                    const perm = await jsonFileHandle.requestPermission({ mode: 'readwrite' });
                    if (perm !== 'granted') {
                        document.getElementById('jsonFileStatus').textContent = '⚠️ Yazma izni reddedildi';
                        return;
                    }
                }
                const writable = await jsonFileHandle.createWritable();
                const payload = { hikayeler, storyOrder };
                await writable.write(JSON.stringify(payload, null, 2));
                await writable.close();
                document.getElementById('jsonFileStatus').textContent = '✅ ' + jsonFileHandle.name + ' — kaydedildi';
            } catch (err) {
                console.error('JSON yazma hatası:', err);
                document.getElementById('jsonFileStatus').textContent = '⚠️ Yazma hatası: ' + err.message;
            }
        }

        // Manuel kaydet butonu
        async function manuelKaydet() {
            if (!jsonFileHandle) {
                alert('Önce bir JSON dosyası bağlayın (📂 Bağla).');
                return;
            }
            await saveToJsonFile();
        }

        // Dosya bağla / oluştur
        async function jsonDosyasiBagla() {
            if (!('showSaveFilePicker' in window)) {
                alert('Tarayıcınız File System Access API desteklemiyor. Lütfen güncel Chrome/Edge kullanın.');
                return;
            }
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: 'hikayeler.json',
                    types: [{ description: 'JSON Dosyası', accept: { 'application/json': ['.json'] } }]
                });
                jsonFileHandle = handle;
                setHandleUI(handle);
                await idbPut(handle);           // Bir sonraki açılış için sakla
                await saveToJsonFile();         // Mevcut veriyi hemen yaz
            } catch (err) {
                if (err.name !== 'AbortError')
                    document.getElementById('jsonFileStatus').textContent = '⚠️ ' + err.message;
            }
        }

        // Dosyadan yükle (kullanıcı seçer)
        async function jsonYukle() {
            if (!('showOpenFilePicker' in window)) {
                alert('Tarayıcınız File System Access API desteklemiyor.');
                return;
            }
            try {
                const [handle] = await window.showOpenFilePicker({
                    types: [{ description: 'JSON Dosyası', accept: { 'application/json': ['.json'] } }]
                });
                await applyJsonHandle(handle);
            } catch (err) {
                if (err.name !== 'AbortError') alert('Yükleme hatası: ' + err.message);
            }
        }

        // Handle'dan veri oku ve uygula
        async function applyJsonHandle(handle) {
            const file = await handle.getFile();
            const text = await file.text();
            const data = JSON.parse(text);
            if (data.hikayeler && data.storyOrder) {
                hikayeler = data.hikayeler;
                storyOrder = data.storyOrder;
                activeStoryId = null;
                saveToLocalStorage();
                renderSidebar();
                document.getElementById('metin').innerText = 'Lütfen soldaki menüden bir hikaye seçin.';
                jsonFileHandle = handle;
                setHandleUI(handle);
                await idbPut(handle);   // Bir sonraki açılış için güncelle
            } else {
                alert('Geçersiz JSON formatı.');
            }
        }

        // Sayfa açılışında önceki handle'ı otomatik geri yükle
        async function autoRestoreHandle() {
            try {
                const handle = await idbGet();
                if (!handle) return;
                // İzin durumunu kontrol et (kullanıcı etkileşimi gerektirmez)
                const perm = await handle.queryPermission({ mode: 'readwrite' });
                if (perm === 'granted') {
                    // İzin hâlâ geçerli → sessizce yükle
                    await applyJsonHandle(handle);
                } else {
                    // İzin gerekiyor → uyarı banner'ı göster, kullanıcı tıklayınca iste
                    jsonFileHandle = handle;   // handle'ı sakla, izin sonrası kullanmak için
                    showRestoreBanner(handle.name);
                }
            } catch (e) {
                console.warn('Handle geri yükleme başarısız:', e);
            }
        }

        function showRestoreBanner(name) {
            const statusEl = document.getElementById('jsonFileStatus');
            statusEl.innerHTML = `<span style="color:#f0a040;cursor:pointer" onclick="izinIsteVeYukle()" title="Tıkla, dosyayı yeniden bağla">🔔 ${name} — izin için tıkla</span>`;
        }

        async function izinIsteVeYukle() {
            if (!jsonFileHandle) return;
            try {
                const perm = await jsonFileHandle.requestPermission({ mode: 'readwrite' });
                if (perm === 'granted') {
                    await applyJsonHandle(jsonFileHandle);
                } else {
                    document.getElementById('jsonFileStatus').textContent = '⚠️ İzin reddedildi';
                }
            } catch (e) {
                document.getElementById('jsonFileStatus').textContent = '⚠️ ' + e.message;
            }
        }

        // ─── VERİ YÖNETİMİ ────────────────────────────────────────────────────
        function saveToLocalStorage() {
            const currentOrder = [...document.querySelectorAll('#story-list button')].map(b => b.dataset.id);
            localStorage.setItem('hikayeApp_data', JSON.stringify(hikayeler));
            localStorage.setItem('hikayeApp_order', JSON.stringify(currentOrder));
        }

        // Hem LocalStorage'a hem JSON dosyasına kaydet
        function saveAll() {
            saveToLocalStorage();
            saveToJsonFile();
        }

        function loadFromLocalStorage() {
            // Kişisel notlar temizlendi - LocalStorage sıfırlanıyor
            localStorage.removeItem('hikayeApp_data');
            localStorage.removeItem('hikayeApp_order');
            hikayeler = {};
            storyOrder = [];
            renderSidebar();
        }

        function renderSidebar() {
            const list = document.getElementById('story-list');
            list.innerHTML = "";
            storyOrder.forEach(id => {
                const btn = document.createElement('button');
                btn.draggable = true;
                btn.dataset.id = id;
                btn.onclick = () => hikayeGoster(id);
                btn.ondragstart = handleDragStart;
                btn.ondragover = handleDragOver;
                btn.ondrop = handleDrop;
                btn.ondragend = handleDragEnd;

                if (id === activeStoryId) {
                    btn.classList.add('selected-story');
                }

                btn.innerHTML = `
                    <span id="name-${id}">${hikayeler[id].menuIsmi}</span>
                    <span class="edit-icon" onclick="event.stopPropagation(); isimDegistir('${id}')">✎</span>
                `;
                list.appendChild(btn);
            });
        }

        // HİKAYE GÖSTERİMİ
        function hikayeGoster(id) {
            activeStoryId = id;
            document.getElementById('metin').innerText = hikayeler[id].metin;
            if (isEditingContent) toggleEditContent(); // Düzenleme açıksa kapat

            // Seçili hikayeyi menüde vurgula
            document.querySelectorAll('#story-list button').forEach(b => b.classList.remove('selected-story'));
            const btn = document.querySelector(`#story-list button[data-id="${id}"]`);
            if (btn) btn.classList.add('selected-story');
        }

        // AYARLAR
        function boyutAyarla(size) {
            document.getElementById('metin').style.fontSize = size + 'px';
            document.getElementById('fontSizeValue').innerText = size + 'px';
        }

        function isimDegistir(id) {
            const yeni = prompt("Yeni isim:", hikayeler[id].menuIsmi);
            if (yeni && yeni.trim() !== "") {
                hikayeler[id].menuIsmi = yeni;
                document.getElementById('name-' + id).innerText = yeni;
                saveAll();
            }
        }

        // SÜRÜKLE BIRAK
        function handleDragStart(e) {
            e.currentTarget.classList.add('dragging');
        }

        function handleDragOver(e) {
            e.preventDefault();
            const list = document.getElementById('story-list');
            const dragging = document.querySelector('.dragging');
            const siblings = [...list.querySelectorAll('button:not(.dragging)')];
            let next = siblings.find(s => e.clientY <= s.offsetTop + s.offsetHeight / 2);
            list.insertBefore(dragging, next);
        }

        function handleDrop(e) {
            e.preventDefault();
            saveAll();
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        // OTOMATİK KAYDIRMA
        let scrollInt = null;
        let isPlaying = false;
        let speed = 20;

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn');
            if (isPlaying) {
                btn.innerText = "⏸ Duraklat";
                btn.classList.add('active');
                scrollInt = setInterval(() => {
                    const c = document.getElementById('content');
                    c.scrollTop += 1;
                    if (c.scrollTop + c.clientHeight >= c.scrollHeight) togglePlay();
                }, 1000 / speed);
            } else {
                btn.innerText = "▶ Oynat";
                btn.classList.remove('active');
                clearInterval(scrollInt);
            }
        }

        function hizGuncelle(v) {
            speed = parseInt(v);
            if (isPlaying) { togglePlay(); togglePlay(); }
        }

        // İÇERİK DÜZENLEME
        function toggleEditContent() {
            if (!activeStoryId) return alert("Önce hikaye seçin.");
            const el = document.getElementById('metin');
            const btn = document.getElementById('editContentBtn');
            isEditingContent = !isEditingContent;

            if (isEditingContent) {
                el.contentEditable = "true";
                el.focus();
                btn.innerText = "✓ Düzenlemeyi Bitir";
                btn.classList.add('active');
            } else {
                el.contentEditable = "false";
                hikayeler[activeStoryId].metin = el.innerText;
                btn.innerText = "✎ Metni Düzenle";
                btn.classList.remove('active');
                saveAll();
            }
        }

        // YÜKLE — başlangıçta IDB'den handle geri yükle, yoksa ilk kez dosya seçtir
        loadFromLocalStorage();
        ilkAcilisHandle();

        // Sayfa açılışında IDB'deki handle'ı dene; yoksa ilk kez dosyayı seçtir/oluştur
        async function ilkAcilisHandle() {
            const statusEl = document.getElementById('jsonFileStatus');
            try {
                const handle = await idbGet();
                if (handle) {
                    // Önceden bağlanmış bir dosya var
                    const perm = await handle.queryPermission({ mode: 'readwrite' });
                    if (perm === 'granted') {
                        await applyJsonHandle(handle);
                    } else {
                        jsonFileHandle = handle;
                        showRestoreBanner(handle.name);
                    }
                } else {
                    // İlk açılış: kullanıcıdan dosya konumunu seçmesini iste
                    if (!('showSaveFilePicker' in window)) {
                        statusEl.textContent = '⚠️ File System API desteklenmiyor (Chrome/Edge gerekli)';
                        return;
                    }
                    statusEl.innerHTML = `<span style="color:#f0a040;cursor:pointer" onclick="ilkDosyaOlustur()" title="Tıkla, hikayeler.json dosyasını oluştur/seç">🔔 İlk açılış — tıkla, JSON dosyasını oluştur</span>`;
                }
            } catch (e) {
                console.warn('İlk açılış handle hatası:', e);
            }
        }

        // İlk açılışta kullanıcı tıklayınca dosyayı seç/oluştur
        async function ilkDosyaOlustur() {
            const statusEl = document.getElementById('jsonFileStatus');
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: 'hikayeler.json',
                    types: [{ description: 'JSON Dosyası', accept: { 'application/json': ['.json'] } }]
                });
                jsonFileHandle = handle;
                setHandleUI(handle);
                await idbPut(handle);
                // Dosya zaten içerik barındırıyorsa oku, yoksa mevcut veriyi yaz
                try {
                    const file = await handle.getFile();
                    const text = await file.text();
                    if (text.trim()) {
                        const data = JSON.parse(text);
                        if (data.hikayeler && data.storyOrder) {
                            hikayeler = data.hikayeler;
                            storyOrder = data.storyOrder;
                            saveToLocalStorage();
                            renderSidebar();
                            document.getElementById('metin').innerText = 'Lütfen soldaki menüden bir hikaye seçin.';
                            statusEl.textContent = '✅ ' + handle.name + ' — yüklendi';
                            return;
                        }
                    }
                } catch (_) { /* boş dosya veya parse hatası → üzerine yaz */ }
                await saveToJsonFile();  // Mevcut (boş) veriyi dosyaya yaz
            } catch (err) {
                if (err.name !== 'AbortError')
                    document.getElementById('jsonFileStatus').textContent = '⚠️ ' + err.message;
            }
        }

        function hikayeEkle() {
            const isim = prompt("Yeni hikayenin adını girin:");
            if (isim && isim.trim() !== "") {
                const id = "story_" + Date.now();
                hikayeler[id] = { menuIsmi: isim.trim(), metin: "Yeni hikaye metni buraya gelecek..." };
                storyOrder.push(id);
                saveAll();
                renderSidebar();
                hikayeGoster(id);
            }
        }

        function hikayeSil() {
            if (!activeStoryId) {
                alert("Lütfen silmek istediğiniz hikayeyi seçin.");
                return;
            }
            if (confirm("'" + hikayeler[activeStoryId].menuIsmi + "' isimli hikayeyi silmek istediğinize emin misiniz?")) {
                if (isEditingContent) {
                    const el = document.getElementById('metin');
                    const btn = document.getElementById('editContentBtn');
                    el.contentEditable = "false";
                    btn.innerText = "✎ Metni Düzenle";
                    btn.classList.remove('active');
                    isEditingContent = false;
                }
                delete hikayeler[activeStoryId];
                storyOrder = storyOrder.filter(id => id !== activeStoryId);
                activeStoryId = null;
                saveAll();
                renderSidebar();
                document.getElementById('metin').innerText = "Lütfen soldaki menüden bir hikaye seçin.";
            }
        }

        function ara(query) {
            const q = query.toLowerCase().trim();
            const list = document.getElementById('story-list');
            const filteredOrder = storyOrder.filter(id => {
                const story = hikayeler[id];
                return story.menuIsmi.toLowerCase().includes(q) ||
                    story.metin.toLowerCase().includes(q);
            });

            // Arama sonuçlarını filtreleyerek menüyü tekrar çiz
            list.innerHTML = "";
            filteredOrder.forEach(id => {
                const btn = document.createElement('button');
                btn.draggable = !q;
                btn.dataset.id = id;
                btn.onclick = () => hikayeGoster(id);
                if (!q) {
                    btn.ondragstart = handleDragStart;
                    btn.ondragover = handleDragOver;
                    btn.ondrop = handleDrop;
                    btn.ondragend = handleDragEnd;
                }

                if (id === activeStoryId) {
                    btn.classList.add('selected-story');
                }

                btn.innerHTML = `
                    <span id="name-${id}">${hikayeler[id].menuIsmi}</span>
                    <span class="edit-icon" onclick="event.stopPropagation(); isimDegistir('${id}')">✎</span>
                `;
                list.appendChild(btn);
            });
        }
    </script>

</body>

</html>
